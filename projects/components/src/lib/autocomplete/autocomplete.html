<div class="au-autocomplete__control-wrap">
  <div
    class="au-autocomplete__control-row"
    [class.au-autocomplete__control-row--open]="listboxVisible()"
    [class.au-autocomplete__control-row--from-tab]="fieldFocusByTab()"
    (focusin)="onControlRowFocusin()"
    (focusout)="onControlRowFocusout($event)"
  >
    <input
      #inputEl
      class="au-autocomplete__input"
      type="text"
      ngCombobox
      #combobox="ngCombobox"
      [(expanded)]="panelOpen"
      [(value)]="comboboxValue"
      [softDisabled]="false"
      [id]="controlId()"
      [attr.placeholder]="placeholder() || null"
      [attr.autocomplete]="autocomplete() ?? 'off'"
      [disabled]="disabled()"
      [readOnly]="readOnly()"
      [attr.required]="required() ? true : null"
      [attr.aria-invalid]="effectiveInvalid() ? 'true' : 'false'"
      [attr.aria-errormessage]="effectiveInvalid() ? formField.errorId() : null"
      [attr.aria-describedby]="ariaDescribedBy() ?? null"
      [attr.aria-required]="required() ? 'true' : null"
      [attr.aria-busy]="loading() ? 'true' : null"
      (focus)="onInputFocus()"
      (blur)="onBlurHost()"
    />

    <span
      class="au-autocomplete__icon"
      aria-hidden="true"
    >
      <au-icon name="chevron-down" />
    </span>
  </div>
</div>

<ng-template
  ngComboboxPopup
  [combobox]="combobox"
>
  @if (loading()) {
    <div class="au-field-listbox__item au-field-listbox__item--loading">
      <au-spinner
        size="sm"
        label="Loading…"
      />
    </div>
  } @else if (showNoResults()) {
    <div
      class="au-field-listbox__item au-field-listbox__item--empty"
      role="status"
    >
      {{ noResultsText() }}
    </div>
  } @else {
    <ul
      ngComboboxWidget
      ngListbox
      #listbox="ngListbox"
      [activeDescendant]="listbox.activeDescendant()"
      [id]="listboxId()"
      class="au-autocomplete__listbox au-field-listbox"
      [(value)]="listboxValue"
      focusMode="activedescendant"
      selectionMode="explicit"
      [softDisabled]="false"
      [attr.aria-label]="formField.label() || 'Suggestions'"
    >
      @for (opt of filteredOptions(); track opt.value; let i = $index) {
        <li
          ngOption
          #rowOpt="ngOption"
          [value]="opt.value"
          [label]="opt.label"
          [disabled]="opt.disabled"
          [id]="optionId(i)"
          class="au-field-listbox__option"
          [class.au-field-listbox__option--active]="rowOpt.active()"
          [class.au-field-listbox__option--selected]="value() === opt.value"
          [class.au-field-listbox__option--disabled]="opt.disabled"
        >
          {{ opt.label }}
        </li>
      }
    </ul>
  }
</ng-template>

@if (name()) {
  <input
    type="hidden"
    [name]="name()"
    [value]="value() ?? ''"
  />
}
