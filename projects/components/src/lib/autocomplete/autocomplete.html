<div class="au-autocomplete__control-wrap">
  <div
    class="au-autocomplete__control-row"
    [class.au-autocomplete__control-row--open]="listboxVisible()"
    [class.au-autocomplete__control-row--from-tab]="fieldFocusByTab()"
    (focusin)="onControlRowFocusin()"
    (focusout)="onControlRowFocusout($event)"
  >
    <input
      #inputEl
      class="au-autocomplete__input"
      type="text"
      role="combobox"
      [id]="controlId()"
      [attr.name]="name() || null"
      [value]="inputValue()"
      [attr.placeholder]="placeholder() || null"
      [attr.autocomplete]="autocomplete() ?? 'off'"
      [attr.aria-expanded]="listboxVisible()"
      [attr.aria-controls]="listboxId()"
      [attr.aria-activedescendant]="activeDescendantId()"
      aria-autocomplete="list"
      [attr.aria-invalid]="effectiveInvalid() ? 'true' : 'false'"
      [attr.aria-errormessage]="effectiveInvalid() ? formField.errorId() : null"
      [attr.aria-describedby]="ariaDescribedBy() ?? null"
      [attr.aria-required]="required() ? 'true' : null"
      [attr.aria-busy]="loading() ? 'true' : null"
      [disabled]="disabled()"
      [readOnly]="readOnly()"
      [attr.required]="required() ? true : null"
      (input)="onInput($event)"
      (focus)="onInputFocus()"
      (keydown)="onKeydown($event)"
      (blur)="onBlurHost()"
    />

    <span
      class="au-autocomplete__icon"
      aria-hidden="true"
    >
      <svg
        width="12"
        height="12"
        viewBox="0 0 12 12"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M3 4.5L6 7.5L9 4.5"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </span>
  </div>

  @if (listboxVisible()) {
    @if (loading()) {
      <div
        class="au-field-listbox__item au-field-listbox__item--loading"
        role="status"
      >
        <span class="au-field-listbox__loading-indicator" aria-hidden="true"></span>
        Loading…
      </div>
    } @else if (showNoResults()) {
      <div
        class="au-field-listbox__item au-field-listbox__item--empty"
        role="status"
      >
        {{ noResultsText() }}
      </div>
    } @else {
      <ul
        #listboxEl
        [id]="listboxId()"
        class="au-autocomplete__listbox au-field-listbox"
        role="listbox"
        [attr.aria-label]="formField.label() || 'Suggestions'"
      >
        @for (opt of filteredOptions(); track opt.value; let i = $index) {
          <li
            [id]="optionId(i)"
            class="au-field-listbox__option"
            role="option"
            [attr.aria-selected]="value() === opt.value"
            [attr.aria-disabled]="opt.disabled ? 'true' : null"
            [class.au-field-listbox__option--active]="highlightedIndex() === i"
            [class.au-field-listbox__option--selected]="value() === opt.value"
            [class.au-field-listbox__option--disabled]="opt.disabled"
            (mouseenter)="onOptionPointerEnter(i, opt)"
            (mousedown)="onOptionPointerDown($event, opt)"
          >
            {{ opt.label }}
          </li>
        }
      </ul>
    }
  }
</div>
