<div
  #controlRow
  class="au-input-date__control-row"
  [class.au-input-date__control-row--from-tab]="fieldFocusByTab()"
  (focusin)="onControlRowFocusin()"
  (focusout)="onControlRowFocusout($event)"
>
  <input
    #inputEl
    class="au-input-date__input"
    type="date"
    [id]="controlId()"
    [attr.name]="name() || null"
    [attr.placeholder]="placeholder() || null"
    [attr.autocomplete]="autocomplete() ?? null"
    [attr.aria-invalid]="effectiveInvalid() ? 'true' : 'false'"
    [attr.aria-errormessage]="effectiveInvalid() ? formField.errorId() : null"
    [attr.aria-describedby]="ariaDescribedBy() ?? null"
    [attr.aria-required]="required() ? 'true' : null"
    [disabled]="disabled()"
    [readOnly]="readOnly()"
    [attr.required]="required() ? true : null"
    (click)="onNativeInputClick($event)"
    (input)="onInput($event)"
    (change)="onChange($event)"
    (blur)="onBlurHost()"
  />

  <span
    class="au-input-date__icon"
    aria-hidden="true"
    (click)="onPickerIconClick($event)"
  >
    <au-icon name="calendar" />
  </span>
</div>

@if (useBoundedPicker()) {
  <au-internal-temporal-picker-panel
    [open]="pickerOpen()"
    [options]="pickerOptions()"
    [selected]="value()"
    [anchor]="controlRowRef()?.nativeElement ?? null"
    ariaLabel="Choose a date"
    (pick)="onPickerPick($event)"
    (dismiss)="closePicker()"
  />
}
