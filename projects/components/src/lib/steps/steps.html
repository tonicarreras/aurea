<div class="au-steps__root">
  <div
    class="au-steps__list"
    [attr.role]="layout() === 'sections' ? 'navigation' : 'tablist'"
    [attr.aria-label]="ariaLabel().trim() || null"
    [attr.aria-orientation]="layout() === 'sections' ? null : 'horizontal'"
    (keydown)="onListKeydown($event)"
  >
    <ng-content select="[auStep]"></ng-content>
  </div>
  <div class="au-steps__panels">
    <ng-content select="[auStepPanel]"></ng-content>
  </div>
</div>
