<div
  class="au-input-password__control-row"
  [class.au-input-password__control-row--with-reveal]="hasRevealUi()"
  [class.au-input-password__control-row--from-tab]="fieldFocusByTab()"
  (focusin)="onControlRowFocusin()"
  (focusout)="onControlRowFocusout($event)"
>
  <input
    class="au-input-password__input"
    [id]="controlId()"
    [attr.name]="name() || null"
    [type]="inputType()"
    [value]="inputDisplay()"
    [attr.placeholder]="placeholder() || null"
    [attr.autocomplete]="autocomplete() ?? null"
    [attr.minlength]="minLength() ?? null"
    [attr.maxlength]="maxLength() ?? null"
    [attr.aria-invalid]="effectiveInvalid() ? 'true' : 'false'"
    [attr.aria-errormessage]="effectiveInvalid() ? formField.errorId() : null"
    [attr.aria-describedby]="ariaDescribedBy() ?? null"
    [attr.aria-required]="required() ? 'true' : null"
    [disabled]="disabled()"
    [readOnly]="readOnly()"
    [attr.required]="required() ? true : null"
    (input)="onInput($event)"
    (blur)="onBlurHost()"
  />

  @if (hasRevealUi()) {
    <button
      type="button"
      class="au-input-password__reveal"
      [disabled]="disabled() || readOnly()"
      [attr.aria-pressed]="revealed()"
      [attr.aria-label]="revealAriaLabel()"
      (click)="toggleReveal()"
    >
      <au-icon
        [name]="revealed() ? 'eye-off' : 'eye'"
        size="sm"
      />
    </button>
  }
</div>
