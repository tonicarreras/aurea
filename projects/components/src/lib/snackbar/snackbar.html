@if (open()) {
  <div
    class="au-snackbar__surface"
    [attr.role]="liveRole()"
    [attr.aria-live]="livePoliteness()"
    aria-atomic="true"
  >
    @if (showVariantIcon() && variantIcon(); as iconName) {
      <span class="au-snackbar__icon">
        <au-icon [name]="iconName" size="md" />
      </span>
    }

    <div class="au-snackbar__body">
      @if (showMessage()) {
        <p class="au-snackbar__message">{{ message() }}</p>
      } @else {
        <div class="au-snackbar__message">
          <ng-content></ng-content>
        </div>
      }
    </div>

    @if (actionLabel().trim() || showCloseButton()) {
      <div class="au-snackbar__actions">
        @if (actionLabel().trim()) {
          <button type="button" class="au-snackbar__action" (click)="onActionClick()">
            {{ actionLabel() }}
          </button>
        }
        @if (showCloseButton()) {
          <button
            type="button"
            class="au-snackbar__close"
            [attr.aria-label]="closeAriaLabel()"
            (click)="onCloseClick()"
          >
            <au-icon name="close" size="sm" />
          </button>
        }
      </div>
    }
  </div>
}
