<button
  #buttonEl
  class="au-button__element"
  [class.au-button__element--loading]="loading()"
  [class.au-button__element--from-tab]="focusByTab()"
  [attr.type]="type()"
  [attr.name]="name() || null"
  [attr.disabled]="disabled() ? true : null"
  [attr.aria-busy]="loading() ? 'true' : null"
  [attr.aria-disabled]="disabled() || loading() ? 'true' : null"
  [attr.aria-label]="effectiveAriaLabel()"
  (focusin)="onFocusin()"
  (focusout)="onFocusout()"
  (click)="onClick($event)"
>
  @if (loading()) {
    <span
      class="au-button__spinner"
      aria-hidden="true"
    >
      <au-spinner
        [decorative]="true"
        [size]="spinnerSize()"
      />
    </span>
  }
  <span
    class="au-button__content"
    [class.au-button__content--hidden]="loading()"
    [attr.aria-hidden]="loading() ? 'true' : null"
  >
    <ng-content></ng-content>
  </span>
</button>
