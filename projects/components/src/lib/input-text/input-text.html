<div
  class="au-input-text__control-row"
  [class.au-input-text__control-row--password]="hasPasswordUi()"
  [class.au-input-text__control-row--from-tab]="fieldFocusByTab()"
  (focusin)="onControlRowFocusin()"
  (focusout)="onControlRowFocusout($event)"
>
  <input
    #inputEl
    class="au-input-text__input"
    [id]="controlId()"
    [attr.name]="name() || null"
    [type]="effectiveInputType()"
    [value]="inputDisplay()"
    [attr.placeholder]="placeholder() || null"
    [attr.autocomplete]="autocomplete() ?? null"
    [readOnly]="readOnly()"
    [attr.required]="required() ? true : null"
    [attr.minlength]="minLength() ?? null"
    [attr.maxlength]="maxLength() ?? null"
    [attr.aria-invalid]="effectiveInvalid() ? 'true' : 'false'"
    [attr.aria-errormessage]="effectiveInvalid() ? formField.errorId() : null"
    [attr.aria-describedby]="ariaDescribedBy() ?? null"
    [attr.aria-required]="required() ? 'true' : null"
    [disabled]="disabled()"
    (input)="onInput($event)"
    (blur)="onBlurHost()"
  />

  @if (hasPasswordUi()) {
    <button
      type="button"
      class="au-input-text__reveal"
      [attr.aria-pressed]="passwordRevealed()"
      [attr.aria-label]="passwordRevealed() ? 'Hide password' : 'Show password'"
      (click)="togglePasswordVisibility()"
    >
      @if (passwordRevealed()) {
        <span class="au-input-text__reveal-text" aria-hidden="true">Hide</span>
      } @else {
        <span class="au-input-text__reveal-text" aria-hidden="true">Show</span>
      }
    </button>
  }
</div>
