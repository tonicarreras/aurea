<dialog
  #dialog
  class="au-dialog__native"
  [attr.aria-labelledby]="title() ? titleHeadingId() : null"
  [attr.aria-label]="!title() && ariaLabel().trim() ? ariaLabel().trim() : null"
  (cancel)="onDialogCancel($event)"
  (close)="onDialogClose()"
  (click)="onDialogClick($event)"
  (keydown)="onDialogKeydown($event)"
>
  <div
    class="au-dialog__panel"
    (click)="$event.stopPropagation()"
  >
    @if (title() || showCloseButton()) {
      <header class="au-dialog__header">
        @if (title()) {
          <h2
            [id]="titleHeadingId()"
            class="au-dialog__title"
          >
            {{ title() }}
          </h2>
        }
        @if (showCloseButton()) {
          <button
            type="button"
            class="au-dialog__close"
            aria-label="Close dialog"
            (click)="onCloseButtonClick()"
          >
            <au-icon
              name="close"
              size="lg"
            />
          </button>
        }
      </header>
    }

    <div class="au-dialog__body">
      <ng-content></ng-content>
    </div>

    @if (hasFooter()) {
      <footer class="au-dialog__footer">
        <ng-content select="[auDialogFooter]"></ng-content>
      </footer>
    }
  </div>
</dialog>
