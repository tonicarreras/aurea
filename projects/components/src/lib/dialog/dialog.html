<dialog
  #dialog
  class="au-dialog__native"
  [attr.aria-labelledby]="title() ? titleHeadingId() : null"
  [attr.aria-label]="!title() && ariaLabel().trim() ? ariaLabel().trim() : null"
  (cancel)="onDialogCancel($event)"
  (close)="onDialogClose()"
  (click)="onDialogClick($event)"
  (keydown)="onDialogKeydown($event)"
>
  <div class="au-dialog__panel" (click)="$event.stopPropagation()">
    @if (title() || showCloseButton()) {
      <header class="au-dialog__header">
        @if (title()) {
          <h2 [id]="titleHeadingId()" class="au-dialog__title">{{ title() }}</h2>
        }
        @if (showCloseButton()) {
          <button
            type="button"
            class="au-dialog__close"
            aria-label="Close dialog"
            (click)="onCloseButtonClick()"
          >
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
              <path d="M15 5L5 15M5 5L15 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        }
      </header>
    }

    <div class="au-dialog__body">
      <ng-content></ng-content>
    </div>

    @if (hasFooter()) {
      <footer class="au-dialog__footer">
        <ng-content select="[auDialogFooter]"></ng-content>
      </footer>
    }
  </div>
</dialog>
