<div class="au-switch__field">
  @if (label()) {
    <div class="au-switch__label-host">
      <label
        class="au-switch__label"
        [attr.for]="controlId()"
      >
        {{ label() }}
        @if (required() && showRequired()) {
          <span
            class="au-switch__required"
            aria-hidden="true"
            title="Required"
            >*</span
          >
          <span class="au-sr-only">(required)</span>
        }
      </label>
    </div>
  }

  <div
    class="au-switch__control-row"
    [class.au-switch__control-row--from-tab]="fieldFocusByTab()"
    (focusin)="onControlRowFocusin()"
    (focusout)="onControlRowFocusout($event)"
  >
    <input
      #inputEl
      class="au-switch__element"
      type="checkbox"
      role="switch"
      [id]="controlId()"
      [attr.name]="name() || null"
      [checked]="checked()"
      [attr.aria-checked]="checked() ? 'true' : 'false'"
      [attr.aria-invalid]="effectiveInvalid() ? 'true' : 'false'"
      [attr.aria-errormessage]="effectiveInvalid() ? formField.errorId() : null"
      [attr.aria-describedby]="ariaDescribedBy() ?? null"
      [attr.aria-required]="required() ? 'true' : null"
      [disabled]="disabled()"
      [attr.required]="required() ? true : null"
      (change)="onChange($event)"
      (blur)="onBlurHost()"
    />
  </div>
</div>
