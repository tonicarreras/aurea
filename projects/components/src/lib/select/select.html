<div class="au-select__control-wrap">
  <div
    class="au-select__control-row"
    [class.au-select__control-row--open]="listboxVisible()"
    [class.au-select__control-row--from-tab]="fieldFocusByTab()"
    (focusin)="onControlRowFocusin()"
    (focusout)="onControlRowFocusout($event)"
  >
    <button
      #triggerEl
      type="button"
      ngCombobox
      #combobox="ngCombobox"
      [(expanded)]="panelOpen"
      [softDisabled]="false"
      class="au-select__trigger"
      [id]="controlId()"
      [disabled]="disabled() || readOnly()"
      [attr.aria-invalid]="effectiveInvalid() ? 'true' : 'false'"
      [attr.aria-errormessage]="effectiveInvalid() ? formField.errorId() : null"
      [attr.aria-describedby]="ariaDescribedBy() ?? null"
      [attr.aria-required]="required() ? 'true' : null"
      [attr.aria-busy]="loading() ? 'true' : null"
      (blur)="onBlurHost()"
    >
      <span
        class="au-select__value"
        [class.au-select__value--placeholder]="showingPlaceholder()"
      >
        {{ triggerLabel() }}
      </span>
    </button>

    <span
      class="au-select__icon"
      aria-hidden="true"
    >
      <au-icon name="chevron-down" />
    </span>
  </div>
</div>

<ng-template
  ngComboboxPopup
  [combobox]="combobox"
>
  @if (loading()) {
    <div class="au-field-listbox__item au-field-listbox__item--loading">
      <au-spinner
        size="sm"
        label="Loading…"
      />
    </div>
  } @else if (showEmpty()) {
    <div
      class="au-field-listbox__item au-field-listbox__item--empty"
      role="status"
    >
      {{ emptyMessage() }}
    </div>
  } @else {
    <ul
      ngComboboxWidget
      ngListbox
      #listbox="ngListbox"
      [activeDescendant]="listbox.activeDescendant()"
      [id]="listboxId()"
      class="au-select__listbox au-field-listbox"
      [(value)]="listboxValue"
      focusMode="activedescendant"
      selectionMode="explicit"
      [softDisabled]="false"
      [attr.aria-label]="formField.label() || 'Options'"
    >
      @if (hasPlaceholder()) {
        <li
          ngOption
          #placeholderOpt="ngOption"
          [value]="placeholderOptionValue"
          [label]="placeholder()"
          [id]="placeholderOptionId()"
          class="au-field-listbox__option au-field-listbox__option--placeholder"
          [class.au-field-listbox__option--active]="placeholderOpt.active()"
          [class.au-field-listbox__option--selected]="value() === null"
        >
          {{ placeholder() }}
        </li>
      }
      @for (opt of options(); track opt.value; let i = $index) {
        <li
          ngOption
          #rowOpt="ngOption"
          [value]="opt.value"
          [label]="opt.label"
          [disabled]="opt.disabled"
          [id]="optionId(i)"
          class="au-field-listbox__option"
          [class.au-field-listbox__option--active]="rowOpt.active()"
          [class.au-field-listbox__option--selected]="value() === opt.value"
          [class.au-field-listbox__option--disabled]="opt.disabled"
        >
          {{ opt.label }}
        </li>
      }
    </ul>
  }
</ng-template>

@if (name()) {
  <input
    type="hidden"
    [name]="name()"
    [value]="value() ?? ''"
  />
}
