@if (hasProjectedMedia()) {
  <div
    class="au-empty-state__media"
    data-au-media-kind="custom"
    part="media"
    aria-hidden="true"
  >
    <ng-content select="[auEmptyStateMedia]" />
  </div>
} @else if (showImage()) {
  <div
    class="au-empty-state__media"
    data-au-media-kind="image"
    part="media"
    [attr.aria-hidden]="imageIsDecorative() ? 'true' : null"
  >
    <img
      [src]="imageSrc()!"
      [alt]="imageAlt()"
    />
  </div>
} @else if (showIcon()) {
  <div
    class="au-empty-state__media"
    data-au-media-kind="icon"
    part="media"
    aria-hidden="true"
  >
    <au-icon
      [name]="icon()!"
      size="lg"
    />
  </div>
}

@if (hasTitle()) {
  @switch (headingLevel()) {
    @case (2) {
      <h2
        [id]="titleId"
        class="au-empty-state__title"
        part="title"
        [textContent]="resolvedTitle()"
      ></h2>
    }
    @case (3) {
      <h3
        [id]="titleId"
        class="au-empty-state__title"
        part="title"
        [textContent]="resolvedTitle()"
      ></h3>
    }
    @default {
      <h4
        [id]="titleId"
        class="au-empty-state__title"
        part="title"
        [textContent]="resolvedTitle()"
      ></h4>
    }
  }
}

@if (hasDescription()) {
  <p
    class="au-empty-state__description"
    part="description"
    [textContent]="resolvedDescription()"
  ></p>
}

<div class="au-empty-state__actions">
  <ng-content />
</div>
