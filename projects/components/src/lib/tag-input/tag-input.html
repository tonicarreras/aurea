<div
  class="au-tag-input__control-row"
  [class.au-tag-input__control-row--from-tab]="fieldFocusByTab()"
  (focusin)="onControlRowFocusin()"
  (focusout)="onControlRowFocusout($event)"
>
  <div
    class="au-tag-input__inner"
    [attr.aria-disabled]="disabled() ? 'true' : null"
  >
    @for (tag of value(); track tag; let i = $index) {
      <span class="au-tag-input__chip">
        <span class="au-tag-input__chip-label">{{ tag }}</span>
        <button
          type="button"
          class="au-tag-input__chip-remove"
          [disabled]="disabled() || readOnly()"
          [attr.aria-label]="removeTagLabel() + ': ' + tag"
          (click)="removeTag(i)"
        >
          <au-icon
            name="close"
            size="sm"
          />
        </button>
      </span>
    }

    <input
      class="au-tag-input__input"
      type="text"
      [id]="controlId()"
      [attr.name]="name() || null"
      [value]="draft()"
      [attr.placeholder]="placeholder() || null"
      [disabled]="disabled() || atMaxTags()"
      [readOnly]="readOnly()"
      [attr.aria-invalid]="effectiveInvalid() ? 'true' : 'false'"
      [attr.aria-errormessage]="effectiveInvalid() ? formField.errorId() : null"
      [attr.aria-describedby]="ariaDescribedBy() ?? null"
      [attr.aria-required]="required() ? 'true' : null"
      [attr.required]="required() && value().length === 0 ? true : null"
      (input)="onDraftInput($event)"
      (keydown)="onDraftKeydown($event)"
      (blur)="onBlurHost()"
    />
  </div>
</div>
