<div class="au-popover__anchor">
  <ng-content select="[auPopoverTrigger]" />
</div>
@if (open()) {
  <div
    #panel
    class="au-popover__panel"
    role="dialog"
    [attr.aria-modal]="'false'"
    tabindex="-1"
    (keydown)="onPanelKeydown($event)"
  >
    <div class="au-popover__body">
      <ng-content />
    </div>
  </div>
}
