<div
  class="au-checkbox__wrapper"
  [class.au-checkbox__wrapper--from-tab]="focusByTab()"
  [class.au-checkbox__wrapper--invalid]="effectiveInvalid()"
  (focusin)="onFocusin()"
  (focusout)="onFocusout($event)"
>
  <input
    #inputEl
    class="au-checkbox__element"
    type="checkbox"
    [id]="resolvedId()"
    [attr.name]="name() || null"
    [checked]="isChecked()"
    [attr.aria-describedby]="ariaDescribedBy() ?? null"
    [attr.aria-invalid]="effectiveInvalid() ? 'true' : 'false'"
    [attr.aria-errormessage]="isInvalid() ? errorId() : null"
    [attr.aria-required]="required() ? 'true' : null"
    [disabled]="disabled()"
    [attr.required]="required() ? true : null"
    (change)="onChange($event)"
  />

  @if (label() || description().trim() || displayError()) {
    <div class="au-checkbox__content">
      @if (label()) {
        <label class="au-checkbox__label" [attr.for]="resolvedId()">
          {{ label() }}
          @if (required() && showRequired()) {
            <span class="au-checkbox__required" aria-hidden="true" title="Required">*</span>
            <span class="au-sr-only">(required)</span>
          }
        </label>
      }

      @if (description().trim()) {
        <p [id]="descriptionId()" class="au-checkbox__description">{{ description() }}</p>
      }

      @if (displayError()) {
        <p [id]="errorId()" class="au-field-error" role="alert">
          <span class="au-field-error__glyph" aria-hidden="true">×</span>
          <span class="au-field-error__text">{{ displayError() }}</span>
        </p>
      }
    </div>
  }
</div>
