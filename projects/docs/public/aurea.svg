<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 570 360" width="100%" height="100%">
    <defs>
        <style>
            .box { 
                fill: none; 
                stroke: #bdc3c7; 
                stroke-width: 2; 
            }
            .spiral { 
                fill: none; 
                stroke: #d4af37; /* Tono dorado */
                stroke-width: 4; 
                stroke-linecap: round; 
            }
        </style>
    </defs>
    
    <!-- Fondo opcional transparente/blanco -->
    <rect width="100%" height="100%" fill="#fafafa"/>
    
    <g transform="translate(10, 10)">
        <!-- Cuadrados de la secuencia de Fibonacci -->
        <rect class="box" x="0" y="0" width="340" height="340" />
        <rect class="box" x="340" y="0" width="210" height="210" />
        <rect class="box" x="420" y="210" width="130" height="130" />
        <rect class="box" x="340" y="260" width="80" height="80" />
        <rect class="box" x="340" y="210" width="50" height="50" />
        <rect class="box" x="390" y="210" width="30" height="30" />
        <rect class="box" x="400" y="240" width="20" height="20" />
        <rect class="box" x="390" y="250" width="10" height="10" />
        <rect class="box" x="390" y="240" width="10" height="10" />

        <!-- Espiral Áurea -->
        <path class="spiral" d="M 0 340 
                                A 340 340 0 0 1 340 0 
                                A 210 210 0 0 1 550 210 
                                A 130 130 0 0 1 420 340 
                                A 80 80 0 0 1 340 260 
                                A 50 50 0 0 1 390 210 
                                A 30 30 0 0 1 420 240 
                                A 20 20 0 0 1 400 260 
                                A 10 10 0 0 1 390 250" />
    </g>
</svg>
