<div class="au-input-date__field">
  @if (label()) {
    <div class="au-input-date__label-host">
      <label class="au-input-date__label" [attr.for]="resolvedId()">
        {{ label() }}
        @if (required() && showRequired()) {
          <span class="au-input-date__required" aria-hidden="true" title="Required">*</span>
          <span class="au-sr-only">(required)</span>
        }
      </label>
    </div>
  }

  <div
    class="au-input-date__control-row"
    [class.au-input-date__control-row--from-tab]="fieldFocusByTab()"
    (focusin)="onControlRowFocusin()"
    (focusout)="onControlRowFocusout($event)"
  >
    <input
      #inputEl
      class="au-input-date__input"
      type="date"
      [id]="resolvedId()"
      [attr.name]="name() || null"
      [value]="inputDisplay()"
      [attr.min]="minDate() ?? null"
      [attr.max]="maxDate() ?? null"
      [attr.placeholder]="placeholder() || null"
      [attr.autocomplete]="autocomplete() ?? null"
      [attr.aria-invalid]="effectiveInvalid() ? 'true' : 'false'"
      [attr.aria-errormessage]="isInvalid() ? errorId() : null"
      [attr.aria-describedby]="ariaDescribedBy() ?? null"
      [attr.aria-required]="required() ? 'true' : null"
      [disabled]="disabled()"
      [readOnly]="readOnly()"
      [attr.required]="required() ? true : null"
      (input)="onInput($event)"
      (blur)="onBlurHost()"
    />

    <span class="au-input-date__icon" aria-hidden="true">
      <svg
        class="au-input-date__icon-svg"
        width="16"
        height="16"
        viewBox="0 0 16 16"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <rect x="2" y="3" width="12" height="11" rx="1.5" stroke="currentColor" stroke-width="1.5" />
        <path d="M2 6h12" stroke="currentColor" stroke-width="1.5" />
        <path
          d="M5 1.5V4M11 1.5V4"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
        />
      </svg>
    </span>
  </div>

  @if (hint().trim()) {
    <p [id]="hintId()" class="au-input-date__hint">{{ hint() }}</p>
  }

  @if (isInvalid()) {
    <div [id]="errorId()" class="au-field-error" role="alert">
      <span class="au-field-error__glyph" aria-hidden="true">×</span>
      <span class="au-field-error__text">{{ displayError() }}</span>
    </div>
  }
</div>
