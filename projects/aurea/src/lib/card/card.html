<article class="au-card__container">
  <ng-content select="[auCardMedia]"></ng-content>
  <div class="au-card__inner">
    <div class="au-card__main">
      <ng-content select="[auCardHeader]"></ng-content>
      <ng-content select="[auCardBody]"></ng-content>
      <ng-content></ng-content>
    </div>
    @if (hasFooter()) {
      <footer class="au-card__footer">
        <ng-content select="[auCardFooter]"></ng-content>
      </footer>
    }
  </div>
</article>
