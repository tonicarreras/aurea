<div class="au-textarea__field">
  @if (label()) {
    <div class="au-textarea__label-host">
      <label class="au-textarea__label" [attr.for]="resolvedId()">
        {{ label() }}
        @if (required() && showRequired()) {
          <span class="au-textarea__required" aria-hidden="true" title="Required">*</span>
          <span class="au-sr-only">(required)</span>
        }
      </label>
    </div>
  }

  <div
    class="au-textarea__control-row"
    [class.au-textarea__control-row--from-tab]="fieldFocusByTab()"
    (focusin)="onControlRowFocusin()"
    (focusout)="onControlRowFocusout($event)"
  >
    <textarea
      #textareaEl
      class="au-textarea__input"
      [id]="resolvedId()"
      [attr.name]="name() || null"
      [attr.rows]="rows()"
      [attr.cols]="cols() ?? null"
      [value]="inputDisplay()"
      [attr.placeholder]="placeholder() || null"
      [attr.autocomplete]="autocomplete() ?? null"
      [readOnly]="readOnly()"
      [attr.required]="required() ? true : null"
      [attr.minlength]="minLength() ?? null"
      [attr.maxlength]="maxLength() ?? null"
      [attr.wrap]="wrap() === 'hard' ? 'hard' : 'soft'"
      [attr.aria-invalid]="effectiveInvalid() ? 'true' : 'false'"
      [attr.aria-errormessage]="isInvalid() ? errorId() : null"
      [attr.aria-describedby]="ariaDescribedBy() ?? null"
      [attr.aria-required]="required() ? 'true' : null"
      [attr.spellcheck]="
        spellcheck() === true ? true : spellcheck() === false ? false : null
      "
      [style.resize]="resize()"
      [disabled]="disabled()"
      (input)="onInput($event)"
      (blur)="onBlurHost()"
    ></textarea>
  </div>

  @if (hint().trim()) {
    <p [id]="hintId()" class="au-textarea__hint">{{ hint() }}</p>
  }

  @if (isInvalid()) {
    <div
      [id]="errorId()"
      class="au-textarea__error"
      role="alert"
    >
      <span class="au-textarea__error-glyph" aria-hidden="true">×</span>
      <span class="au-textarea__error-text">{{ displayError() }}</span>
    </div>
  }
</div>
