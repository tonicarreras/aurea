<div class="au-input-number__field">
  @if (label()) {
    <div class="au-input-number__label-host">
      <label class="au-input-number__label" [attr.for]="resolvedId()">
        {{ label() }}
        @if (required() && showRequired()) {
          <span class="au-input-number__required" aria-hidden="true" title="Required">*</span>
          <span class="au-sr-only">(required)</span>
        }
      </label>
    </div>
  }

  <div
    class="au-input-number__control-row"
    [class.au-input-number__control-row--from-tab]="fieldFocusByTab()"
    (focusin)="onControlRowFocusin()"
    (focusout)="onControlRowFocusout($event)"
  >
    <input
      #inputEl
      class="au-input-number__input"
      type="number"
      [id]="resolvedId()"
      [attr.name]="name() || null"
      [value]="inputDisplay()"
      [attr.placeholder]="placeholder() || null"
      [attr.autocomplete]="autocomplete() ?? null"
      [readOnly]="readOnly()"
      [attr.min]="min() ?? null"
      [attr.max]="max() ?? null"
      [attr.step]="step() === 'any' ? 'any' : step()"
      [attr.aria-invalid]="effectiveInvalid() ? 'true' : 'false'"
      [attr.aria-errormessage]="isInvalid() ? errorId() : null"
      [attr.aria-describedby]="ariaDescribedBy() ?? null"
      [attr.aria-required]="required() ? 'true' : null"
      [disabled]="disabled()"
      [attr.required]="required() ? true : null"
      (input)="onInput($event)"
      (blur)="onBlurHost()"
    />
  </div>

  @if (hint().trim()) {
    <p [id]="hintId()" class="au-input-number__hint">{{ hint() }}</p>
  }

  @if (isInvalid()) {
    <div [id]="errorId()" class="au-field-error" role="alert">
      <span class="au-field-error__glyph" aria-hidden="true">×</span>
      <span class="au-field-error__text">{{ displayError() }}</span>
    </div>
  }
</div>
