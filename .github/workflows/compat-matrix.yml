name: Angular compatibility matrix

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compat:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        angular_core: ['^21.2.0', '^21.2.14']
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install monorepo dependencies
        run: bun install --frozen-lockfile

      - name: Build Aurea library
        run: bun run build:components

      - name: Verify peer compile against Angular ${{ matrix.angular_core }}
        run: node scripts/verify-angular-compat.mjs "${{ matrix.angular_core }}"
