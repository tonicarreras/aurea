name: Publish package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver to publish (manual runs only; releases use the tag, e.g. v0.1.2 → 0.1.2)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve publish version
        id: publish_version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
            echo "Source: release tag → ${VERSION}"
          elif [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            echo "Source: workflow input → ${VERSION}"
          else
            VERSION=$(node -p "require('./projects/components/package.json').version")
            echo "Source: projects/components/package.json → ${VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
        working-directory: projects/components

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun run test

      - name: Build library
        run: bun run build

      - name: Verify package contents and version
        run: |
          test -f dist/components/package.json
          test -f dist/components/fesm2022/au-components.mjs
          test -f dist/components/styles/au-tokens.css
          BUILT=$(node -p "require('./dist/components/package.json').version")
          EXPECTED="${{ steps.publish_version.outputs.version }}"
          echo "Publishing au-components@${BUILT} (expected ${EXPECTED})"
          test "$BUILT" = "$EXPECTED"

      - name: Check npm registry
        id: registries
        working-directory: dist/components
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"

          if npm view "au-components@${PKG_VERSION}" version 2>/dev/null | grep -Fxq "${PKG_VERSION}"; then
            echo "npm_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "npm_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect NPM_TOKEN
        id: npm_token
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "${NPM_TOKEN}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::NPM_TOKEN is not set on the production environment — skipping npm publish."
            echo "::warning::Add NPM_TOKEN so users can run: bun add au-components"
          fi

      - name: Setup Node for npmjs.org
        if: steps.npm_token.outputs.present == 'true' && steps.registries.outputs.npm_published != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: https://registry.npmjs.org
          scope: '@aurea-ds'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify npm identity (debug 403)
        if: steps.npm_token.outputs.present == 'true' && steps.registries.outputs.npm_published != 'true'
        run: |
          echo "npm whoami: $(npm whoami)"
          echo "If this is not a member of org 'aurea-ds', npm publish will return 403."

      - name: Publish to npm
        if: steps.npm_token.outputs.present == 'true' && steps.registries.outputs.npm_published != 'true'
        working-directory: dist/components
        run: npm publish --access public

      - name: Summary
        run: |
          echo "## au-components@${{ steps.registries.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.registries.outputs.npm_published }}" = "true" ]; then
            echo "- npm: ✓ already on npmjs" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.npm_token.outputs.present }}" = "true" ]; then
            echo "- npm: ✓ published this run" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- npm: ⚠ skipped (set **NPM_TOKEN** on the **production** environment)" >> "$GITHUB_STEP_SUMMARY"
          fi
