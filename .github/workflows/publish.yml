name: Publish to GitHub Packages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require publish token
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::Repository secret GH_PACKAGES_TOKEN is missing or empty."
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node (GitHub Packages auth)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: https://npm.pkg.github.com
          scope: '@tonicarreras'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun run test

      - name: Build library
        run: bun run build

      - name: Verify package contents
        run: |
          test -f dist/aurea/package.json
          test -f dist/aurea/fesm2022/tonicarreras-aurea.mjs
          test -f dist/aurea/styles/au-tokens.css

      - name: Publish to GitHub Packages
        working-directory: dist/aurea
        run: npm publish --access public --registry=https://npm.pkg.github.com
