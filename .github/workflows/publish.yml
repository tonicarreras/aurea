name: Publish package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver to publish (manual runs only; releases use the tag, e.g. v0.1.2 → 0.1.2)'
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve publish version
        id: publish_version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
            echo "Source: release tag → ${VERSION}"
          elif [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            echo "Source: workflow input → ${VERSION}"
          else
            VERSION=$(node -p "require('./package.json').version")
            echo "Source: projects/aurea/package.json → ${VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
        working-directory: projects/aurea

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun run test

      - name: Build library
        run: bun run build

      - name: Verify package contents and version
        run: |
          test -f dist/aurea/package.json
          test -f dist/aurea/fesm2022/tonicarreras-aurea.mjs
          test -f dist/aurea/styles/au-tokens.css
          BUILT=$(node -p "require('./dist/aurea/package.json').version")
          EXPECTED="${{ steps.publish_version.outputs.version }}"
          echo "Publishing @tonicarreras/aurea@${BUILT} (expected ${EXPECTED})"
          test "$BUILT" = "$EXPECTED"

      - name: Check published versions
        id: registries
        working-directory: dist/aurea
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || github.token }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"

          if npm view "@tonicarreras/aurea@${PKG_VERSION}" version \
            --registry=https://npm.pkg.github.com 2>/dev/null | grep -Fxq "${PKG_VERSION}"; then
            echo "gh_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "gh_published=false" >> "$GITHUB_OUTPUT"
          fi

          if npm view "@tonicarreras/aurea@${PKG_VERSION}" version 2>/dev/null | grep -Fxq "${PKG_VERSION}"; then
            echo "npm_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "npm_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm (install without token)
        if: steps.registries.outputs.npm_published != 'true'
        working-directory: dist/aurea
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Publish to GitHub Packages
        if: steps.registries.outputs.gh_published != 'true'
        working-directory: dist/aurea
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || github.token }}
        run: npm publish --access public --registry=https://npm.pkg.github.com

      - name: Summary
        run: |
          echo "## @tonicarreras/aurea@${{ steps.registries.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- npm: ${{ steps.registries.outputs.npm_published == 'true' && '✓ already on npmjs' || 'published (requires NPM_TOKEN secret)' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- GitHub Packages: ${{ steps.registries.outputs.gh_published == 'true' && '✓ already on GitHub' || '✓ published' }}" >> "$GITHUB_STEP_SUMMARY"
