name: Publish to GitHub Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver to publish (only for manual runs; releases use the tag, e.g. v0.1.2 → 0.1.2)'
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve publish version
        id: publish_version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
            echo "Source: release tag → ${VERSION}"
          elif [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            echo "Source: workflow input → ${VERSION}"
          else
            VERSION=$(node -p "require('./package.json').version")
            echo "Source: projects/aurea/package.json → ${VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
        working-directory: projects/aurea

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node (GitHub Packages auth)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: https://npm.pkg.github.com
          scope: '@tonicarreras'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || github.token }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun run test

      - name: Build library
        run: bun run build

      - name: Verify package contents and version
        run: |
          test -f dist/aurea/package.json
          test -f dist/aurea/fesm2022/tonicarreras-aurea.mjs
          test -f dist/aurea/styles/au-tokens.css
          BUILT=$(node -p "require('./dist/aurea/package.json').version")
          EXPECTED="${{ steps.publish_version.outputs.version }}"
          echo "Publishing @tonicarreras/aurea@${BUILT} (expected ${EXPECTED})"
          test "$BUILT" = "$EXPECTED"

      - name: Check if version is already on the registry
        id: version
        working-directory: dist/aurea
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"
          if npm view "@tonicarreras/aurea@${PKG_VERSION}" version \
            --registry=https://npm.pkg.github.com 2>/dev/null | grep -Fxq "${PKG_VERSION}"; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Version ${PKG_VERSION} is already on GitHub Packages — skipping publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "Version ${PKG_VERSION} is not published yet."
          fi

      - name: Publish to GitHub Packages
        if: steps.version.outputs.already_published != 'true'
        working-directory: dist/aurea
        run: npm publish --access public --registry=https://npm.pkg.github.com

      - name: Publish skipped (version exists)
        if: steps.version.outputs.already_published == 'true'
        run: |
          echo "::notice::@tonicarreras/aurea@${{ steps.version.outputs.version }} already exists. Use a new tag (e.g. v0.1.2) or bump projects/aurea/package.json."
