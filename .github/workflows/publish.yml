name: Publish package

# Solo publica tras merge a main (PR cerrada + merged), release o manual.
# No corre en PRs abiertas ni en pushes a develop.
on:
  pull_request:
    types: [closed]
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Override semver (manual only). Otherwise uses projects/components/package.json.'
        required: false
        type: string

concurrency:
  group: publish-npm-${{ github.event.pull_request.merge_commit_sha || github.sha }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'release' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}
          fetch-depth: 0

      - name: Resolve publish version
        id: publish_version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
            echo "Source: release tag → ${VERSION}"
          elif [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            echo "Source: workflow input → ${VERSION}"
          else
            VERSION=$(node -p "require('./package.json').version")
            echo "Source: package.json → ${VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
        working-directory: projects/components

      - name: Install dependencies
        uses: ./.github/actions/bun-install

      - name: Check if version is already on npm
        id: npm_skip
        run: |
          VERSION="${{ steps.publish_version.outputs.version }}"
          if npm view "@aurea-design-system/components@${VERSION}" version 2>/dev/null | grep -Fxq "${VERSION}"; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} is already on npm — skipping build and publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Test
        if: steps.npm_skip.outputs.already_published != 'true'
        run: bun run test

      - name: Build library
        id: build_lib
        if: steps.npm_skip.outputs.already_published != 'true'
        run: bun run build

      - name: Verify package contents and version
        if: steps.npm_skip.outputs.already_published != 'true'
        id: verify_pkg
        run: |
          test -f dist/components/package.json
          test -f dist/components/LICENSE
          test -f dist/components/fesm2022/aurea-design-system-components.mjs
          test -f dist/components/styles/au-tokens.css
          test -f dist/components/styles/aurea-global.css
          BUILT=$(node -p "require('./dist/components/package.json').version")
          PKG=$(node -p "require('./dist/components/package.json').name")
          EXPECTED="${{ steps.publish_version.outputs.version }}"
          echo "Publishing ${PKG}@${BUILT} (expected ${EXPECTED})"
          test "$BUILT" = "$EXPECTED"
          test "$PKG" = "@aurea-design-system/components"
          echo "pkg_name=${PKG}" >> "$GITHUB_OUTPUT"
          echo "version=${BUILT}" >> "$GITHUB_OUTPUT"

      - name: Check npm registry
        if: steps.npm_skip.outputs.already_published != 'true'
        id: registries
        env:
          PKG_NAME: ${{ steps.verify_pkg.outputs.pkg_name }}
          PKG_VERSION: ${{ steps.verify_pkg.outputs.version }}
        run: |
          echo "version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"

          if npm view "${PKG_NAME}@${PKG_VERSION}" version 2>/dev/null | grep -Fxq "${PKG_VERSION}"; then
            echo "npm_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "npm_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect NPM_TOKEN
        id: npm_token
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "${NPM_TOKEN}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::NPM_TOKEN is not set on the production environment — skipping npm publish."
            echo "::warning::Add NPM_TOKEN so users can run: bun add @aurea-design-system/components"
          fi

      - name: Setup Node for npmjs.org
        if: >-
          steps.npm_skip.outputs.already_published != 'true' &&
          steps.build_lib.outcome == 'success' &&
          steps.npm_token.outputs.present == 'true' &&
          steps.registries.outputs.npm_published != 'true'
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: https://registry.npmjs.org
          scope: '@aurea-design-system'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify npm identity (debug 403)
        if: >-
          steps.npm_skip.outputs.already_published != 'true' &&
          steps.build_lib.outcome == 'success' &&
          steps.npm_token.outputs.present == 'true' &&
          steps.registries.outputs.npm_published != 'true'
        run: |
          echo "npm whoami: $(npm whoami)"
          echo "If this account cannot publish @aurea-design-system/components, npm publish will return 403."

      - name: Publish to npm
        if: >-
          steps.npm_skip.outputs.already_published != 'true' &&
          steps.build_lib.outcome == 'success' &&
          steps.verify_pkg.outcome == 'success' &&
          steps.npm_token.outputs.present == 'true' &&
          steps.registries.outputs.npm_published != 'true'
        working-directory: dist/components
        run: |
          test -f package.json || (echo "::error::dist/components missing — build did not run or failed." && exit 1)
          npm publish --access public --provenance

      - name: Create Git tag (if missing)
        if: >-
          steps.npm_skip.outputs.already_published != 'true' &&
          steps.registries.outputs.npm_published != 'true' &&
          steps.npm_token.outputs.present == 'true'
        env:
          VERSION: ${{ steps.publish_version.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="components-v${VERSION}"
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists — skipping tag create."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${TAG}" -m "@aurea-design-system/components ${VERSION}"
            git push origin "${TAG}"
          fi

      - name: Create GitHub Release
        if: >-
          steps.npm_skip.outputs.already_published != 'true' &&
          steps.registries.outputs.npm_published != 'true' &&
          steps.npm_token.outputs.present == 'true'
        env:
          VERSION: ${{ steps.publish_version.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="components-v${VERSION}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "GitHub Release ${TAG} already exists — skipping."
            exit 0
          fi
          node scripts/extract-changelog-section.mjs "${VERSION}" > release-notes.md
          gh release create "${TAG}" \
            --title "@aurea-design-system/components ${VERSION}" \
            --notes-file release-notes.md

      - name: Summary
        run: |
          VERSION="${{ steps.publish_version.outputs.version }}"
          if [ "${{ steps.npm_skip.outputs.already_published }}" = "true" ]; then
            echo "## @aurea-design-system/components@${VERSION}" >> "$GITHUB_STEP_SUMMARY"
            echo "- npm: ✓ already published (no action)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "## ${{ steps.verify_pkg.outputs.pkg_name }}@${{ steps.registries.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.registries.outputs.npm_published }}" = "true" ]; then
            echo "- npm: ✓ already on [npmjs](https://www.npmjs.com/package/@aurea-design-system/components)" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.npm_token.outputs.present }}" = "true" ]; then
            echo "- npm: ✓ published this run → \`bun add @aurea-design-system/components\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- GitHub: release \`components-v${VERSION}\` (tag + notes from CHANGELOG)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- npm: ⚠ skipped (set **NPM_TOKEN** on the **production** environment)" >> "$GITHUB_STEP_SUMMARY"
          fi
