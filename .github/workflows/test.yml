name: Test

# pull_request: PRs hacia main/develop (p. ej. develop → main).
# push solo en main: evita duplicar con push a develop + pull_request en la misma PR.
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

concurrency:
  group: test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Unit tests with coverage
        run: bun run test:coverage

      - name: Install Playwright browsers (Storybook test-runner)
        run: node node_modules/playwright/cli.js install --with-deps chromium chromium-headless-shell

      - name: Storybook test-runner (play + a11y)
        run: bun run test-storybook:ci

      - name: Coverage job summary
        if: always()
        run: node scripts/write-coverage-summary.mjs

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage/components/
          retention-days: 30
          if-no-files-found: ignore

      - name: Prettier
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Build docs
        run: bun run build:docs
