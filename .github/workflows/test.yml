name: Test

# pull_request: PRs hacia main/develop (p. ej. develop → main).
# push solo en main: evita duplicar con push a develop + pull_request en la misma PR.
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

concurrency:
  group: test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install dependencies
        uses: ./.github/actions/bun-install

      - name: Dependency audit
        run: bun run audit:ci

      - name: Build library
        run: bun run build:components

      - name: Check bundle size
        run: bun run check:bundle

      - name: Validate design tokens (JSON ↔ CSS)
        run: bun run validate:tokens

      - name: Verify Storybook story tags
        run: bun run verify:story-tags

      - name: Verify docs i18n parity (en/es)
        run: bun run verify:i18n

      - name: Sync visual story manifest (committed)
        run: bun run verify:visual-manifest

      - name: Unit tests with coverage
        run: bun run test:coverage

      - name: Schematic tests
        run: bun run test:schematics

      - name: Spec quality audit
        run: bun run audit:spec-quality

      - name: Install Playwright browsers (Storybook test-runner)
        run: node node_modules/playwright/cli.js install --with-deps chromium chromium-headless-shell

      - name: Storybook test-runner (play + a11y)
        run: bun run test-storybook:ci

      - name: Coverage job summary
        if: always()
        run: node scripts/write-coverage-summary.mjs

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage/components/
          retention-days: 30
          if-no-files-found: ignore

      - name: Prettier
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Build docs
        run: bun run build:docs

      - name: Upload docs build
        uses: actions/upload-artifact@v6
        with:
          name: docs-dist
          path: dist/docs/
          retention-days: 1
          if-no-files-found: error

  docs-e2e:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install dependencies
        uses: ./.github/actions/bun-install

      - name: Download docs build
        uses: actions/download-artifact@v6
        with:
          name: docs-dist
          path: dist/docs

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Docs site smoke tests
        run: bun run test:docs:e2e

  visual-regression:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install dependencies
        uses: ./.github/actions/bun-install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Storybook visual smoke tests
        run: bun run test:visual:ci

      - name: Upload visual diff artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: visual-regression-diff
          path: |
            projects/components/e2e-visual/test-results/
            playwright-report/
          retention-days: 14
          if-no-files-found: ignore
