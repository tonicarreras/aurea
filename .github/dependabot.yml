# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      angular:
        patterns:
          - '@angular/*'
          - 'angular-*'
      storybook:
        patterns:
          - '@storybook/*'
          - 'storybook'
          - '@compodoc/*'
      playwright:
        patterns:
          - 'playwright'
          - '@playwright/*'
          - 'axe-playwright'
      vitest:
        patterns:
          - 'vitest'
          - '@vitest/*'
          - '@testing-library/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
