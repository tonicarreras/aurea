name: Bun install (cached)
description: Setup Bun from packageManager and install deps with ~/.bun/install/cache
inputs:
  frozen-lockfile:
    description: Pass --frozen-lockfile to bun install
    required: false
    default: 'true'
runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version-file: package.json

    - name: Cache Bun install store
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: bun-install-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: |
          bun-install-${{ runner.os }}-

    - name: Install dependencies
      shell: bash
      run: |
        if [ "${{ inputs.frozen-lockfile }}" = "true" ]; then
          bun install --frozen-lockfile
        else
          bun install
        fi
